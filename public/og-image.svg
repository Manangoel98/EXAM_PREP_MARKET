<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <radialGradient id="orb1" cx="0.3" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="0.7" cy="0.7" r="0.5">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative Orbs -->
  <circle cx="200" cy="150" r="250" fill="url(#orb1)"/>
  <circle cx="1000" cy="500" r="300" fill="url(#orb2)"/>
  
  <!-- Logo/Icon (Simple representation) -->
  <circle cx="150" cy="150" r="60" fill="#ffffff" opacity="0.1"/>
  <text x="150" y="170" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#ffffff" text-anchor="middle">N</text>
  
  <!-- Main Title -->
  <text x="100" y="300" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="url(#textGradient)">
    NomoExam
  </text>
  
  <!-- Subtitle -->
  <text x="100" y="370" font-family="Arial, sans-serif" font-size="36" fill="#e0e7ff" opacity="0.9">
    AI-Powered Exam Prep Platform
  </text>
  
  <!-- Feature Badges -->
  <g transform="translate(100, 430)">
    <!-- Badge 1: SAT -->
    <rect x="0" y="0" width="120" height="50" rx="25" fill="#ffffff" opacity="0.15"/>
    <text x="60" y="33" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#ffffff" text-anchor="middle">SAT</text>
    
    <!-- Badge 2: GRE -->
    <rect x="140" y="0" width="120" height="50" rx="25" fill="#ffffff" opacity="0.15"/>
    <text x="200" y="33" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#ffffff" text-anchor="middle">GRE</text>
    
    <!-- Badge 3: GMAT -->
    <rect x="280" y="0" width="130" height="50" rx="25" fill="#ffffff" opacity="0.15"/>
    <text x="345" y="33" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#ffffff" text-anchor="middle">GMAT</text>
    
    <!-- Badge 4: JEE -->
    <rect x="430" y="0" width="120" height="50" rx="25" fill="#ffffff" opacity="0.15"/>
    <text x="490" y="33" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#ffffff" text-anchor="middle">JEE</text>
  </g>
  
  <!-- CTA Text -->
  <text x="100" y="550" font-family="Arial, sans-serif" font-size="28" fill="#ffffff" opacity="0.8">
    10,000+ Questions " AI Tutor " Free Trial
  </text>
</svg>
